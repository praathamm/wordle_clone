<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ur kinda cute</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-left">
      <button class="icon-btn" id="help-button" aria-label="help">
        <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"></path></svg>
      </button>
    </div>
    <div class="header-title">jesus loves you</div>
    <div class="header-right">
      <button class="icon-btn" id="stats-button" aria-label="stats">
        <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24"><path d="M16,11V3H8v6H2v12h20V11H16z M10,5h4v14h-4V5z M4,11h4v8H4V11z M20,19h-4v-6h4V19z"></path></svg>
      </button>
      <button class="icon-btn" id="settings-button" aria-label="settings">
        <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65A.5.5 0 0014 2h-4c-.25 0-.46.18-.5.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64L19.43 12.98zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"></path></svg>
      </button>
    </div>
  </header>

  <!-- ===== GAME ===== -->
  <div class="game">

    <!-- Toast / message -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Board -->
    <div class="board-container">
      <div class="board" id="board">
        <div class="tile-group" id="group-1">
          <div class="tile" data-index="0"><div class="tile-inner"><div class="tile-front"></div><div class="tile-back"></div></div></div>
          <div class="tile" data-index="1"><div class="tile-inner"><div class="tile-front"></div><div class="tile-back"></div></div></div>
          <div class="tile" data-index="2"><div class="tile-inner"><div class="tile-front"></div><div class="tile-back"></div></div></div>
          <div class="tile" data-index="3"><div class="tile-inner"><div class="tile-front"></div><div class="tile-back"></div></div></div>
          <div class="tile" data-index="4"><div class="tile-inner"><div class="tile-front"></div><div class="tile-back"></div></div></div>
          <div class="tile" data-index="5"><div class="tile-inner"><div class="tile-front"></div><div class="tile-back"></div></div></div>
        </div>
      </div>
    </div>

    <!-- Keyboard -->
    <div class="keyboard" id="keyboard">
      <div class="keyboard-row">
        <button data-key="q" class="key">q</button>
        <button data-key="w" class="key">w</button>
        <button data-key="e" class="key">e</button>
        <button data-key="r" class="key">r</button>
        <button data-key="t" class="key">t</button>
        <button data-key="y" class="key">y</button>
        <button data-key="u" class="key">u</button>
        <button data-key="i" class="key">i</button>
        <button data-key="o" class="key">o</button>
        <button data-key="p" class="key">p</button>
      </div>
      <div class="keyboard-row">
        <div class="key-spacer half"></div>
        <button data-key="a" class="key">a</button>
        <button data-key="s" class="key">s</button>
        <button data-key="d" class="key">d</button>
        <button data-key="f" class="key">f</button>
        <button data-key="g" class="key">g</button>
        <button data-key="h" class="key">h</button>
        <button data-key="j" class="key">j</button>
        <button data-key="k" class="key">k</button>
        <button data-key="l" class="key">l</button>
        <div class="key-spacer half"></div>
      </div>
      <div class="keyboard-row">
        <button data-key="enter" class="key key-large">Enter</button>
        <button data-key="z" class="key">z</button>
        <button data-key="x" class="key">x</button>
        <button data-key="c" class="key">c</button>
        <button data-key="v" class="key">v</button>
        <button data-key="b" class="key">b</button>
        <button data-key="n" class="key">n</button>
        <button data-key="m" class="key">m</button>
        <button data-key="backspace" class="key key-large">
          <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24" aria-hidden="true" class="icon-key"><path fill="currentColor" d="M22 3H7c-.69 0-1.23.35-1.59.88L0 12l5.41 8.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2.59 12.59L17 17l-3.5-3.5L10 17l-1.59-1.41L12 12 8.41 8.41 10 7l3.5 3.5L17 7l1.41 1.59L15 12l3.41 3.59z"></path></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ===== MODAL ===== -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close" aria-label="close">
        <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24"><path d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"></path></svg>
      </button>
      <div class="modal-content" id="modal-content"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
